# Cloud Build CI — build the backend image and deploy it to Cloud Run on every
# push to main (replaces Render's autoDeploy). Mirrors the linguaflow/bizcard
# pipeline in this same project.
#
# Note: the deploy step passes ONLY --image, so it preserves the service's
# existing env vars + Secret Manager bindings. Runtime config is managed
# out-of-band with `gcloud run services update` — CI just ships new code.
substitutions:
  _SERVICE: arxivlens-backend
  _REGION: asia-east1
  # Project id hardcoded on purpose: Cloud Build does NOT expand built-in
  # substitutions ($PROJECT_ID) inside a user-substitution value, so nesting it
  # here produced a literal "$PROJECT_ID" in the image tag. This repo only ever
  # deploys to this one project, so a literal id is simplest and unambiguous.
  _IMAGE: asia-east1-docker.pkg.dev/sylvan-faculty-438200-p5/cloud-run-source-deploy/arxivlens-backend

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    env: ['DOCKER_BUILDKIT=1']
    args: ['build', '-t', '${_IMAGE}:$SHORT_SHA', '-t', '${_IMAGE}:latest',
           '-f', 'backend/Dockerfile', 'backend']
  - id: push
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_IMAGE}']
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: ['run', 'deploy', '${_SERVICE}',
           '--image', '${_IMAGE}:$SHORT_SHA',
           '--region', '${_REGION}', '--quiet']
  # Keep only the 3 newest Cloud Run revisions (Cloud Run has no native
  # retention). The just-deployed revision is newest, so it's always kept.
  # Shell vars are written $$x so Cloud Build passes a literal $x to bash;
  # ${_SERVICE}/${_REGION} are Cloud Build substitutions. Artifact Registry
  # images are pruned separately by the repo's keep-recent-3 cleanup policy.
  - id: prune-revisions
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        echo "Pruning old Cloud Run revisions for ${_SERVICE}, keeping 3 newest…"
        gcloud run revisions list --service=${_SERVICE} --region=${_REGION} \
          --sort-by="~metadata.creationTimestamp" --format="value(metadata.name)" \
          | tail -n +4 \
          | while read -r rev; do
              [ -n "$$rev" ] && { echo "deleting $$rev"; gcloud run revisions delete "$$rev" --region=${_REGION} --quiet || true; }
            done

# Default machine (e2-standard-2) — free-tier 2,500 build-min/month; do NOT set a
# custom machineType (those are billed from minute one). Java/Maven build ~3-5 min.
options:
  logging: CLOUD_LOGGING_ONLY
timeout: 1200s
