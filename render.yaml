# Render blueprint — declarative service config so the backend can be rebuilt
# from a single push without clicking through the dashboard.
# Docs: https://render.com/docs/blueprint-spec
#
# How to use:
#   1. Push this repo to GitHub.
#   2. In Render dashboard → "New" → "Blueprint" → connect the repo.
#   3. Render reads this file and provisions the backend service.
#   4. Set the secrets marked `sync: false` in the dashboard before first deploy.
#
# The frontend lives on Vercel (separate platform, separate config) — see DEPLOY.md.
services:
  - type: web
    name: arxivlens-backend
    runtime: docker
    plan: free                 # 512 MB RAM, sleeps after 15 min idle
    # Originally set to `singapore` for low DB latency, but Render's Singapore
    # egress IP is flagged by Google's Gemini geo-IP filter (FAILED_PRECONDITION
    # "User location is not supported"). Oregon is reliably supported. The DB
    # round-trip from Oregon → TiDB Singapore is +~150 ms per query, acceptable
    # for hobby use; move TiDB to AWS us-west-2 if you want it consistent.
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true           # rebuild on every push to main

    envVars:
      # Spring profile — switches off schema.sql / data.sql, turns on Hibernate
      # auto-migration, quiets logs.
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # Render injects PORT automatically; declared here so Spring picks it up via
      # ${PORT:8080} in application.properties. No need to set in dashboard.
      - key: PORT
        value: 10000

      # JVM tuning for the 512 MB free tier — leave heap headroom for native + GC.
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=70.0 -XX:+UseSerialGC -Xss512k

      # All secrets/connection strings are set in the Render dashboard. Marking them
      # `sync: false` keeps them OUT of this file (so the file can stay in git).
      - key: SPRING_DATASOURCE_URL
        sync: false           # jdbc:mysql://<tidb-host>:4000/arxivlens?useSSL=true&...
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

      - key: JWT_SECRET
        sync: false           # 32+ random bytes; generate with `openssl rand -hex 32`

      - key: GEMINI_API_KEY
        sync: false           # leave unset to disable AI features instead of erroring
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

      # Comma-separated whitelist of frontend origins. Update after Vercel deploys.
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false           # https://arxivlens.vercel.app,https://arxivlens-*.vercel.app

      # Public frontend URL — used to build the password-reset link in emails.
      # Set this AFTER Vercel deploys; should match your production domain exactly.
      - key: APP_FRONTEND_BASE_URL
        sync: false           # e.g. https://arxivlens.vercel.app

      # Outgoing email. Render Free blocks outbound SMTP (ports 25/465/587) for
      # anti-abuse, so SMTP CANNOT deliver from here — only HTTP-based providers
      # work. We use Resend (https://resend.com): free 3k emails/month.
      #
      # Steps:
      #   1. Sign up at resend.com, create an API key.
      #   2. Set RESEND_API_KEY below.
      #   3. Leave MAIL_FROM empty for testing — it defaults to
      #      "arxivLens <onboarding@resend.dev>", which Resend will deliver
      #      ONLY to the email you registered with. To send to other recipients,
      #      verify your own domain in Resend and put your address in MAIL_FROM.
      #
      # SMTP env vars below are kept for local dev convenience (where SMTP isn't
      # blocked); leaving them unset on Render is correct.
      - key: RESEND_API_KEY
        sync: false           # re_xxxx… from resend.com
      - key: MAIL_FROM
        sync: false           # blank = onboarding@resend.dev (Resend dev sandbox)
      - key: MAIL_HOST
        sync: false           # leave unset on Render (SMTP blocked anyway)
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

      # Google OAuth — Web client ID from console.cloud.google.com.
      # MUST match NEXT_PUBLIC_GOOGLE_CLIENT_ID on the frontend (Vercel) so the
      # backend will accept ID tokens minted with the same audience. Authorized
      # JS origins on the OAuth client must include https://arxivlens.vercel.app
      # (prod) and http://localhost:3000 (local dev).
      # Leave blank to fall back to the mock demo-user behavior.
      - key: GOOGLE_CLIENT_ID
        sync: false           # e.g. 880984423210-…apps.googleusercontent.com

      # Toggle scheduler if you want to throttle outbound API usage on cold starts.
      - key: SCHEDULER_ENABLED
        value: "true"

      # Email a summary after each scheduled arXiv sync (every 6h). Blank
      # disables it. Delivery needs RESEND_API_KEY set above; with Resend's dev
      # sandbox the recipient must be the email you registered with Resend.
      # Defaults to the maintainer's address in application.properties; override
      # here to change or disable.
      - key: SYNC_NOTIFY_EMAIL
        sync: false
