services:
  mysql:
    image: mysql:8.4
    container_name: arxivlens-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: arxivlens
      MYSQL_USER: arxivlens
      MYSQL_PASSWORD: arxivlens
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - arxivlens-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpw"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - arxivlens

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: arxivlens-backend:dev
    container_name: arxivlens-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/arxivlens?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: arxivlens
      SPRING_DATASOURCE_PASSWORD: arxivlens
      JWT_SECRET: ${JWT_SECRET:-please-change-me-this-must-be-at-least-32-bytes-long-for-HS256}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
      SCHEDULER_ENABLED: "false"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 45s
    networks:
      - arxivlens

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: arxivlens-frontend:dev
    container_name: arxivlens-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      INTERNAL_API_URL: http://backend:8080/api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - arxivlens

networks:
  arxivlens:
    driver: bridge

volumes:
  arxivlens-mysql-data:
