name: Scheduled source sync

# Render's free tier sleeps the backend after 15 min idle, so its in-process
# @Scheduled jobs are unreliable. This workflow POSTs to the token-protected
# trigger endpoints every 6h instead — the request wakes the service and runs
# each sync + notification email.
#
# Setup (one time):
#   1. Backend (Render): set env CRON_TOKEN to a secret, e.g. `openssl rand -hex 32`.
#   2. This repo: Settings → Secrets and variables → Actions → New repository
#      secret `CRON_TOKEN` with the SAME value.
#   3. (Optional) Add a repo *variable* `BACKEND_URL` if your backend isn't at
#      the default below.

on:
  schedule:
    # 00:00 / 06:00 / 12:00 / 18:00 UTC. GitHub may delay scheduled runs a few
    # minutes under load — fine for a 6-hourly refresh.
    - cron: "0 */6 * * *"
  workflow_dispatch: {} # lets you trigger it by hand from the Actions tab

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger arXiv sync
        env:
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
          BACKEND_URL: ${{ vars.BACKEND_URL || 'https://arxivlens-backend-880984423210.asia-east1.run.app' }}
        run: |
          if [ -z "$CRON_TOKEN" ]; then
            echo "::warning::CRON_TOKEN secret is not set — skipping. Add it under Settings → Secrets and variables → Actions."
            exit 0
          fi
          echo "Triggering ${BACKEND_URL}/api/cron/arxiv-sync"
          # Generous timeout + retries: the first hit after the service has slept
          # pays a ~30s cold-start wake, which can exhaust one attempt.
          curl -fsS --max-time 120 --retry 3 --retry-all-errors --retry-delay 30 \
            -X POST -H "X-Cron-Token: ${CRON_TOKEN}" \
            "${BACKEND_URL}/api/cron/arxiv-sync"
          echo
          echo "Triggered. The summary email follows once the sync finishes."

      - name: Trigger McKinsey sync
        env:
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
          BACKEND_URL: ${{ vars.BACKEND_URL || 'https://arxivlens-backend-880984423210.asia-east1.run.app' }}
        run: |
          if [ -z "$CRON_TOKEN" ]; then
            echo "::warning::CRON_TOKEN secret is not set — skipping. Add it under Settings → Secrets and variables → Actions."
            exit 0
          fi
          echo "Triggering ${BACKEND_URL}/api/cron/mckinsey-sync"
          # Service is already awake from the arXiv trigger above, so no cold-start
          # margin needed — but keep the retries for transient network blips.
          curl -fsS --max-time 120 --retry 3 --retry-all-errors --retry-delay 30 \
            -X POST -H "X-Cron-Token: ${CRON_TOKEN}" \
            "${BACKEND_URL}/api/cron/mckinsey-sync"
          echo
          echo "Triggered. The summary email follows once the sync finishes."
