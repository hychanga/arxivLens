spring.application.name=arxivlens

# ----- Server -----
# PaaS platforms (Render / Heroku / Railway) inject the listen port via $PORT.
# We MUST honor it — Render's port scanner will only consider the service Live
# when something binds to that exact port. Locally PORT is unset, so we fall
# back to 8080.
server.port=${PORT:8080}
# Use a project-local work dir to avoid Spring Boot 4's ownership check on %TEMP% (Windows).
server.tomcat.basedir=${user.dir}/target/tomcat

# ----- Datasource (MySQL by default) -----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/arxivlens?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:arxivlens}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:arxivlens}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- JPA -----
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# ----- SQL init (schema.sql + data.sql) -----
spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.sql.init.continue-on-error=false

# ----- JWT -----
app.jwt.secret=${JWT_SECRET:please-change-me-this-must-be-at-least-32-bytes-long-for-HS256}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.issuer=arxivlens

# ----- AI provider (Gemini for now) -----
app.ai.provider=${AI_PROVIDER:gemini}
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# ----- CORS -----
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ----- Sources / scheduler -----
app.scheduler.arxiv-cron=${ARXIV_SYNC_CRON:0 0 */6 * * *}
app.scheduler.hbr-cron=${HBR_SYNC_CRON:0 30 */6 * * *}
app.scheduler.enabled=${SCHEDULER_ENABLED:true}

# ----- Mail (SMTP) -----
# Spring Boot's mail auto-config only wires JavaMailSender when spring.mail.host
# is non-blank. EmailService mirrors that — if MAIL_HOST is unset, password-reset
# emails are logged at WARN instead of sent (useful for dev / Render Free without
# an SMTP credential). For Gmail SMTP: host smtp.gmail.com, port 587, app
# password (not your account password) as MAIL_PASSWORD.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
# Mirrored copy of the SMTP host into app.* so EmailService can decide without
# touching Spring's MailProperties internals.
app.mail.host=${MAIL_HOST:}
app.mail.from=${MAIL_FROM:noreply@arxivlens.local}

# ----- Frontend base URL — used to build the password-reset link in emails. -----
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:3000}

# ----- Password reset -----
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}

# ----- Actuator -----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
