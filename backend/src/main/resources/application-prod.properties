# ============================================================================
# Production profile — activated via SPRING_PROFILES_ACTIVE=prod
# ============================================================================
# Goals:
#   1. NEVER drop production data on restart.
#   2. Let Hibernate own schema migrations (good enough for hobby; switch to
#      Flyway/Liquibase if this app ever grows real users).
#   3. Tighter logging.
# Lookup data (sources / topics / settings) and demo accounts are seeded by
# DataSeeder in Java, so the application boots cleanly against an empty
# managed DB (TiDB Cloud Serverless, PlanetScale, Aiven, etc.).
# ============================================================================

# Don't run schema.sql / data.sql — both contain DROP TABLE which would wipe
# production data on every restart, and INSERT statements that conflict with
# the Java seeder.
spring.sql.init.mode=never

# Hibernate creates missing tables and adds new columns on startup. Will not
# drop existing data. Caveat: it WILL NOT rename columns, change types, or
# remove columns — those need a manual migration.
spring.jpa.hibernate.ddl-auto=update

# Production logging — quiet down hibernate SQL spam, keep app-level logs at INFO.
spring.jpa.show-sql=false
logging.level.com.arxivlens=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Render's free tier does not let us tell DevTools that this is the dev box, so
# disable the auto-restart watcher even if the jar happens to ship with devtools.
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Default scheduler ON — every 6h re-syncs sources without intervention.
# Override with SCHEDULER_ENABLED=false to disable.
app.scheduler.enabled=${SCHEDULER_ENABLED:true}
