# ============================================================================
# Production profile — activated via SPRING_PROFILES_ACTIVE=prod
# ============================================================================
# Goals:
#   1. NEVER drop production data on restart.
#   2. Let Hibernate own schema migrations (good enough for hobby; switch to
#      Flyway/Liquibase if this app ever grows real users).
#   3. Tighter logging.
# Lookup data (sources / topics / settings) and demo accounts are seeded by
# DataSeeder in Java, so the application boots cleanly against an empty
# managed DB (TiDB Cloud Serverless, PlanetScale, Aiven, etc.).
# ============================================================================

# Don't run schema.sql / data.sql — both contain DROP TABLE which would wipe
# production data on every restart, and INSERT statements that conflict with
# the Java seeder.
# Force the prod datasource to be set explicitly. If SPRING_DATASOURCE_URL is
# missing in env, fail at startup with a clear message instead of letting the
# dev fallback (`jdbc:mysql://localhost:3306/...`) silently 100% fail with a
# misleading "Connection refused" message.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.sql.init.mode=never

# Hibernate creates missing tables and adds new columns on startup. Will not
# drop existing data. Caveat: it WILL NOT rename columns, change types, or
# remove columns — those need a manual migration.
spring.jpa.hibernate.ddl-auto=update

# Production logging — quiet down hibernate SQL spam, keep app-level logs at INFO.
spring.jpa.show-sql=false
logging.level.com.arxivlens=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Render's free tier does not let us tell DevTools that this is the dev box, so
# disable the auto-restart watcher even if the jar happens to ship with devtools.
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Default scheduler ON — every 6h re-syncs sources without intervention.
# Override with SCHEDULER_ENABLED=false to disable.
app.scheduler.enabled=${SCHEDULER_ENABLED:true}

# NOTE: tried `spring.main.lazy-initialization=true` here to speed up cold starts,
# but it makes the embedded Tomcat factory lazy too — Tomcat then never binds the
# listen port, Render's port scanner times out, and the service is killed even
# though DataSeeder + StartupSyncRunner ran successfully. Keep eager init.

# ----- Hikari (connection pool) — tuned for Render Free 512 MB / shared CPU -----
# Without these the default pool of 10 idle connections eats most of our heap
# budget AND the default 30 s connect timeout has no margin over Render's
# port-scan window once you add Hibernate validation and JIT warm-up. These cap both.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# Pre-empt the classic
#   ConnectionIsClosedException: No operations allowed after connection closed
# that surfaces during commit() when an idle pooled connection has been silently
# killed upstream (TiDB Cloud serverless idles aggressively; Render NAT also
# drops long-idle TCP). With keepalive Hikari pings idle connections every
# `keepaliveTime`, detects deadness, and evicts them before the app borrows them.
# Must be < max-lifetime (600 000); we use 2 min so the worst-case stale window
# is ~2 min rather than the full lifetime.
spring.datasource.hikari.keepalive-time=120000

# Cold start + TiDB Cloud TLS handshake can take 5–8 s; give the first connection
# attempt some headroom rather than failing fast.
spring.datasource.hikari.initialization-fail-timeout=20000
