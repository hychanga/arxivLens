spring.application.name=arxivlens-test

# H2 in-memory for tests
spring.datasource.url=jdbc:h2:mem:arxivlens;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Don't auto-load schema.sql (it's MySQL-specific); tests can use @Sql for fixtures
spring.sql.init.mode=never

app.jwt.secret=test-secret-test-secret-test-secret-test-secret-32+
app.jwt.expiration-ms=3600000
app.jwt.issuer=arxivlens-test

app.cors.allowed-origins=http://localhost:3000
app.scheduler.enabled=false
